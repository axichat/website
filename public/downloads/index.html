<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axichat Downloads</title>
    <meta
      name="description"
      content="Simple Axichat downloads for Android, Windows, Linux, and upcoming Apple support."
    />
    <style>
      :root {
        color-scheme: light;
        --surface: #ffffff;
        --surface-muted: rgba(0, 0, 0, 0.03);
        --line: rgba(0, 0, 0, 0.1);
        --text: #111111;
        --text-muted: rgba(17, 17, 17, 0.72);
        --text-faint: rgba(17, 17, 17, 0.55);
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        --radius-xl: 20px;
        --radius-lg: 16px;
        --radius-control: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(1000px 520px at 10% -10%, rgba(0, 0, 0, 0.05), transparent 60%),
          radial-gradient(900px 500px at 100% 0%, rgba(0, 0, 0, 0.04), transparent 60%),
          var(--surface);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(100%, 92rem);
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
      }

      .site-header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        min-height: 4rem;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        min-width: 0;
        text-decoration: none;
      }

      .brand img {
        width: 3rem;
        height: 3rem;
        display: block;
        flex-shrink: 0;
      }

      .brand span {
        font-size: 1.45rem;
        line-height: 1;
        letter-spacing: 0.015em;
        font-weight: 600;
      }

      .header-links {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 0.75rem;
      }

      .header-link {
        display: inline-flex;
        align-items: center;
        min-height: 2.5rem;
        padding: 0 1rem;
        border-radius: var(--radius-control);
        border: 1px solid var(--line);
        background: #fff;
        text-decoration: none;
        font-size: 0.92rem;
        color: var(--text-muted);
        transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      }

      .header-link:hover {
        background: var(--surface-muted);
        color: var(--text);
      }

      @supports (corner-shape: squircle) {
        .header-link,
        .release-meta,
        .primary-download-button,
        .platform-option,
        .button,
        .download-card a,
        .copy-button,
        .status-card {
          corner-shape: squircle;
        }
      }

      .header-link.primary {
        border-color: #111111;
        background: #111111;
        color: #ffffff;
      }

      .header-link.primary:hover {
        background: rgba(17, 17, 17, 0.88);
      }

      main {
        padding: 1.75rem 0 4rem;
      }

      .release-meta {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.7rem;
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: #fff;
        padding: 0.75rem 1rem;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .release-meta strong {
        color: var(--text);
      }

      .featured-downloads {
        display: grid;
        gap: 1.25rem;
        padding: 0 0 2rem;
      }

      .primary-download-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }

      .google-play-badge {
        display: inline-flex;
        align-items: center;
        width: 13rem;
        max-width: 100%;
        min-height: 3.875rem;
        transition: filter 0.18s ease, transform 0.18s ease;
      }

      .google-play-badge:hover,
      .primary-download-button:hover {
        transform: translateY(-1px);
        filter: brightness(0.96);
      }

      .google-play-badge img {
        display: block;
        width: 100%;
        height: auto;
      }

      .primary-download-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        width: 13rem;
        max-width: 100%;
        min-height: 3.875rem;
        border: 1px solid var(--button-border);
        border-radius: var(--radius-control);
        background: var(--button-bg);
        color: var(--button-text);
        padding: 0.75rem 0.85rem;
        text-decoration: none;
        transition: filter 0.18s ease, transform 0.18s ease;
      }

      .primary-download-button.windows {
        --button-bg: #2563eb;
        --button-border: #2563eb;
        --button-text: #ffffff;
        --button-muted: rgba(255, 255, 255, 0.75);
        --icon-bg: rgba(255, 255, 255, 0.96);
        --icon-border: rgba(255, 255, 255, 0.64);
      }

      .primary-download-button.linux {
        --button-bg: #dc143c;
        --button-border: #dc143c;
        --button-text: #ffffff;
        --button-muted: rgba(255, 255, 255, 0.75);
        --icon-bg: rgba(255, 255, 255, 0.96);
        --icon-border: rgba(255, 255, 255, 0.58);
      }

      .primary-download-button.apple {
        --button-bg: #c0c0c0;
        --button-border: #c0c0c0;
        --button-text: #111111;
        --button-muted: rgba(17, 17, 17, 0.72);
        --icon-bg: rgba(255, 255, 255, 0.92);
        --icon-border: rgba(17, 17, 17, 0.14);
      }

      .primary-download-button.is-disabled {
        cursor: default;
      }

      .primary-download-button.is-disabled:hover {
        transform: none;
        filter: none;
      }

      .primary-download-main {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 0.55rem;
      }

      .primary-download-icon {
        display: grid;
        place-items: center;
        width: 2rem;
        height: 2rem;
        flex-shrink: 0;
        border: 1px solid var(--icon-border);
        border-radius: 0.65rem;
        background: var(--icon-bg);
      }

      .primary-download-icon img {
        display: block;
        width: 1.6rem;
        height: 1.6rem;
        object-fit: contain;
      }

      .primary-download-copy {
        display: grid;
        gap: 0.1rem;
        min-width: 0;
      }

      .primary-download-copy strong,
      .primary-download-copy span {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .primary-download-copy strong {
        font-size: 0.78rem;
        line-height: 1.1;
      }

      .primary-download-copy span {
        color: var(--button-muted);
        font-size: 0.66rem;
        line-height: 1.15;
      }

      .primary-download-arrow {
        flex-shrink: 0;
        font-size: 1rem;
        opacity: 0.9;
      }

      .sections {
        display: grid;
        gap: 2rem;
      }

      .section-block {
        display: grid;
        gap: 1rem;
      }

      .section-heading {
        display: grid;
        gap: 0.35rem;
      }

      .section-heading h2 {
        margin: 0;
        font-size: clamp(1.5rem, 2.6vw, 2.25rem);
        letter-spacing: -0.02em;
      }

      .section-heading p {
        margin: 0;
        max-width: 48rem;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .card-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(18rem, 1fr));
      }

      .platform-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(14.5rem, 1fr));
        align-items: stretch;
      }

      .platform-card {
        display: grid;
        grid-template-rows: 7.75rem minmax(4.5rem, auto) auto auto minmax(0, 1fr);
        gap: 1rem;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: #fff;
        padding: 1.5rem;
        box-shadow: var(--shadow);
        align-content: start;
      }

      .platform-card.disabled {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.03), transparent 8rem),
          #ffffff;
      }

      .platform-figure {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 7.75rem;
        height: 7.75rem;
        border-radius: 2rem;
        background: rgba(17, 17, 17, 0.035);
        color: #111111;
        align-self: start;
      }

      .platform-figure svg {
        width: 5rem;
        height: 5rem;
        display: block;
      }

      .platform-figure img {
        width: 5rem;
        height: 5rem;
        display: block;
        object-fit: contain;
      }

      .platform-copy {
        display: grid;
        gap: 0.3rem;
        align-content: start;
      }

      .platform-copy h3 {
        margin: 0;
        font-size: 1.7rem;
        line-height: 1.02;
        letter-spacing: -0.03em;
      }

      .platform-copy p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.5;
        font-size: 0.95rem;
      }

      .platform-meta {
        color: var(--text-faint);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .platform-options {
        display: grid;
        gap: 0.6rem;
        align-content: start;
      }

      .platform-card > .button,
      .platform-card > .button.is-disabled {
        align-self: start;
        justify-self: start;
      }

      .platform-option {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.8rem 0.95rem;
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: rgba(0, 0, 0, 0.02);
        color: var(--text-muted);
        text-decoration: none;
        transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      }

      .platform-option:hover {
        background: rgba(0, 0, 0, 0.04);
        color: var(--text);
      }

      .platform-option-icon {
        width: 2rem;
        height: 2rem;
        flex-shrink: 0;
        object-fit: contain;
      }

      .platform-option-copy {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        width: 100%;
      }

      .platform-option span {
        font-size: 0.93rem;
        font-weight: 600;
      }

      .platform-option strong {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-faint);
      }

      .download-card {
        display: grid;
        gap: 1rem;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: #fff;
        padding: 1.25rem;
        box-shadow: var(--shadow);
      }

      .download-card.recommended {
        border-color: rgba(17, 17, 17, 0.16);
        background:
          linear-gradient(180deg, rgba(17, 17, 17, 0.04), transparent 7rem),
          #ffffff;
      }

      .card-header {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.9rem;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 1.8rem;
        border-radius: 0.8rem;
        padding: 0 0.75rem;
        font-size: 0.74rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        background: rgba(17, 17, 17, 0.06);
        color: rgba(17, 17, 17, 0.78);
      }

      .download-card.recommended .tag {
        background: #111111;
        color: #ffffff;
      }

      .meta {
        text-align: right;
        color: var(--text-faint);
        font-size: 0.84rem;
        line-height: 1.45;
      }

      .download-card h3 {
        margin: 0.1rem 0 0;
        font-size: 1.3rem;
        line-height: 1.12;
        letter-spacing: -0.02em;
      }

      .description {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.65;
        font-size: 0.96rem;
      }

      .file-row {
        display: grid;
        gap: 0.4rem;
        padding: 0.9rem 1rem;
        border-radius: var(--radius-lg);
        background: rgba(0, 0, 0, 0.03);
      }

      .file-row strong {
        font-size: 0.82rem;
        color: rgba(17, 17, 17, 0.86);
      }

      .file-row code {
        font-family: ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.82rem;
        color: rgba(17, 17, 17, 0.72);
        overflow-wrap: anywhere;
      }

      .compact-list {
        display: grid;
        gap: 0.9rem;
      }

      .compact-item {
        display: grid;
        gap: 0.8rem;
        border: 1px solid var(--line);
        border-radius: 1.1rem;
        background: #fff;
        padding: 1rem;
        box-shadow: var(--shadow);
      }

      .compact-main {
        display: grid;
        gap: 0.25rem;
      }

      .compact-main strong {
        font-size: 0.95rem;
      }

      .compact-main span {
        color: var(--text-muted);
        line-height: 1.55;
        font-size: 0.9rem;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.8rem;
        padding: 0 1rem;
        border-radius: var(--radius-control);
        border: 1px solid #111111;
        background: #111111;
        color: #ffffff;
        text-decoration: none;
        font-size: 0.93rem;
        font-weight: 700;
        transition: transform 0.18s ease, opacity 0.18s ease, background-color 0.18s ease;
      }

      .button:hover {
        transform: translateY(-1px);
        opacity: 0.96;
      }

      .button.secondary {
        border-color: var(--line);
        background: #fff;
        color: var(--text-muted);
        font-weight: 600;
      }

      .button.secondary:hover {
        color: var(--text);
        background: rgba(0, 0, 0, 0.03);
      }

      .button.is-disabled {
        border-color: rgba(0, 0, 0, 0.1);
        background: rgba(0, 0, 0, 0.05);
        color: var(--text-faint);
        pointer-events: none;
      }

      .simple-list {
        display: grid;
        gap: 0.9rem;
      }

      .simple-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.9rem;
        border: 1px solid var(--line);
        border-radius: 1.15rem;
        background: #fff;
        padding: 1rem 1.05rem;
        box-shadow: var(--shadow);
      }

      .simple-copy {
        display: grid;
        gap: 0.25rem;
      }

      .simple-copy strong {
        font-size: 0.96rem;
      }

      .simple-copy span {
        color: var(--text-muted);
        line-height: 1.5;
        font-size: 0.9rem;
      }

      .status-card {
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: #fff;
        padding: 1.2rem 1.25rem;
        box-shadow: var(--shadow);
      }

      .status-card p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .footer {
        border-top: 1px solid var(--line);
        padding: 1.4rem 0 2.5rem;
      }

      .footer-inner {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.9rem;
        color: var(--text-faint);
        font-size: 0.9rem;
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem;
      }

      .footer-links a {
        color: var(--text-faint);
        text-decoration: none;
      }

      .footer-links a:hover {
        color: var(--text);
      }

      @media (max-width: 700px) {
        .site-header-inner,
        .footer-inner {
          flex-direction: column;
          align-items: flex-start;
        }

        .header-links {
          justify-content: flex-start;
        }

        .meta {
          text-align: left;
        }

        .platform-figure {
          width: 6.5rem;
          height: 6.5rem;
        }

        .platform-figure svg,
        .platform-figure img {
          width: 4.25rem;
          height: 4.25rem;
        }

        .platform-card {
          grid-template-rows: 6.5rem minmax(4.5rem, auto) auto auto minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="shell site-header-inner">
        <a class="brand" href="../">
          <img src="../images/brand/axichat_logo_black.png" alt="Axichat" />
          <span>Axichat</span>
        </a>
        <div class="header-links">
          <a class="header-link" href="../">Main Site</a>
          <a class="header-link primary" href="../register/">
            Create account
          </a>
        </div>
      </div>
    </header>

    <main>
      <div class="shell">
        <section class="featured-downloads" aria-label="Primary downloads">
          <div class="primary-download-grid">
            <a
              class="google-play-badge"
              href="https://play.google.com/store/apps/details?id=im.axi.axichat"
              target="_blank"
              rel="noreferrer"
            >
              <img src="../images/platforms/google-play-badge.svg" alt="Get it on Google Play" />
            </a>
            <a
              class="primary-download-button windows"
              href="https://github.com/axichat/axichat/releases/latest/download/axichat-windows-setup.exe"
              target="_blank"
              rel="noreferrer"
            >
              <span class="primary-download-main">
                <span class="primary-download-icon"><img src="../images/platforms/windows.svg" alt="" /></span>
                <span class="primary-download-copy">
                  <strong>Windows</strong>
                  <span>Installer .exe</span>
                </span>
              </span>
              <span class="primary-download-arrow" aria-hidden="true">&#8595;</span>
            </a>
            <a
              class="primary-download-button linux"
              href="https://github.com/axichat/axichat/releases/latest/download/axichat-x86_64.AppImage"
              target="_blank"
              rel="noreferrer"
            >
              <span class="primary-download-main">
                <span class="primary-download-icon"><img src="../images/platforms/linux.svg" alt="" /></span>
                <span class="primary-download-copy">
                  <strong>Linux</strong>
                  <span>AppImage</span>
                </span>
              </span>
              <span class="primary-download-arrow" aria-hidden="true">&#8595;</span>
            </a>
            <a
              class="primary-download-button apple"
              href="https://github.com/axichat/axichat/releases/latest/download/axichat-macos.dmg"
              target="_blank"
              rel="noreferrer"
            >
              <span class="primary-download-main">
                <span class="primary-download-icon"><img src="../images/platforms/apple.svg" alt="" /></span>
                <span class="primary-download-copy">
                  <strong>macOS</strong>
                  <span>DMG</span>
                </span>
              </span>
              <span class="primary-download-arrow" aria-hidden="true">&#8595;</span>
            </a>
          </div>
          <div id="release-meta" class="release-meta">
            <strong>Loading latest release...</strong>
          </div>
        </section>

        <section id="downloads-root" class="sections">
          <div class="status-card">
            <p>Loading the latest GitHub release files...</p>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="shell footer-inner">
        <div>&copy; <span id="year"></span> Axichat LLC</div>
        <div class="footer-links">
          <a href="../">Home</a>
          <a href="../privacy/">Privacy</a>
          <a href="../terms/">Terms</a>
        </div>
      </div>
    </footer>

    <script>
      const RELEASE_API_URL = "https://api.github.com/repos/axichat/axichat/releases/latest";
      const RELEASES_PAGE_URL = "https://github.com/axichat/axichat/releases/latest";
      const CACHE_KEY = "axichat.downloads.latest.v2";
      const CACHE_TTL_MS = 5 * 60 * 1000;

      const downloadsRoot = document.getElementById("downloads-root");
      const releaseMeta = document.getElementById("release-meta");
      const yearNode = document.getElementById("year");

      yearNode.textContent = String(new Date().getFullYear());

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) {
          return "";
        }
        const units = ["B", "KB", "MB", "GB"];
        let value = bytes;
        let unitIndex = 0;
        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }
        const decimals = value >= 100 || unitIndex === 0 ? 0 : 1;
        return value.toFixed(decimals) + " " + units[unitIndex];
      }

      function formatDate(value) {
        if (!value) {
          return "";
        }
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) {
          return "";
        }
        return new Intl.DateTimeFormat("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric"
        }).format(parsed);
      }

      function readCache() {
        try {
          const raw = window.localStorage.getItem(CACHE_KEY);
          if (!raw) {
            return null;
          }
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") {
            return null;
          }
          if (!Number.isFinite(parsed.fetchedAt) || !parsed.release || !Array.isArray(parsed.release.assets)) {
            return null;
          }
          return parsed;
        } catch {
          return null;
        }
      }

      function writeCache(payload) {
        try {
          window.localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
        } catch {
          // Ignore storage failures.
        }
      }

      function isFresh(entry) {
        return Date.now() - entry.fetchedAt <= CACHE_TTL_MS;
      }

      function isChecksumAssetName(name) {
        return /\.(sha256|sha1)$/i.test(name);
      }

      function checksumSuffix(name) {
        const match = name.match(/\.(sha256|sha1)$/i);
        return match ? match[1].toUpperCase() : "Checksum";
      }

      function stripChecksumSuffix(name) {
        return name.replace(/\.(sha256|sha1)$/i, "");
      }

      function classifyAsset(asset) {
        const name = asset.name.toLowerCase();

        if (name === "app-production-release.apk") {
          return {
            platform: "android",
            section: "recommended",
            order: 10,
            tag: "Android",
            title: "Android APK",
            description: "APK",
            action: "Download Android APK"
          };
        }

        if (name === "axichat-windows-setup.exe") {
          return {
            platform: "windows",
            section: "recommended",
            order: 20,
            tag: "Windows",
            title: "Windows installer",
            description: "Installer",
            action: "Download Windows Installer"
          };
        }

        if (name === "axichat-x86_64.appimage") {
          return {
            platform: "linux",
            section: "recommended",
            order: 30,
            tag: "Linux",
            title: "Linux AppImage",
            description: "AppImage",
            action: "Download Linux AppImage"
          };
        }

        if (name === "axichat-linux-amd64.deb") {
          return {
            platform: "linux",
            section: "recommended",
            order: 40,
            tag: "Linux",
            title: ".deb package",
            description: "Ubuntu / Debian",
            action: "Download Linux .deb"
          };
        }

        if (name === "axichat-windows.zip") {
          return {
            platform: "windows",
            section: "other",
            order: 50,
            tag: "Windows",
            title: "Portable ZIP",
            description: "ZIP",
            action: "Download Windows ZIP"
          };
        }

        if (name === "app-arm64-v8a-production-release.apk") {
          return {
            platform: "android",
            section: "other",
            order: 60,
            tag: "Android",
            title: "ARM64 APK",
            description: "Newer Android",
            action: "Download Android ARM64 APK"
          };
        }

        if (name === "axichat-linux.tar.gz") {
          return {
            platform: "linux",
            section: "other",
            order: 70,
            tag: "Linux",
            title: "tar.gz archive",
            description: "Manual setup",
            action: "Download Linux tar.gz"
          };
        }

        if (/\.(dmg|pkg)$/i.test(name) || name.includes("macos") || name.includes("darwin")) {
          const isDmg = name.endsWith(".dmg");
          const isPkg = name.endsWith(".pkg");
          return {
            platform: "apple",
            section: "recommended",
            order: 80,
            tag: "Apple",
            title: isDmg ? "macOS DMG" : isPkg ? "macOS installer" : "macOS download",
            description: isDmg ? "DMG" : isPkg ? "PKG" : "Mac",
            action: isDmg ? "Download macOS DMG" : "Download for Mac"
          };
        }

        if (name.endsWith(".ipa") || name.includes("ios")) {
          return {
            platform: "apple",
            section: "other",
            order: 90,
            tag: "Apple",
            title: "iPhone / iPad build",
            description: "iPhone / iPad",
            action: "Download iOS build"
          };
        }

        return {
          platform: null,
          section: "advanced",
          order: 999,
          tag: "Advanced",
          title: "Other release file",
          description: "Less common or manual file from the latest GitHub release.",
          action: "Download File"
        };
      }

      function buildReleaseEntries(release) {
        const checksumMap = new Map();
        const primaryAssets = [];

        for (const asset of release.assets || []) {
          if (!asset || typeof asset.name !== "string") {
            continue;
          }
          if (isChecksumAssetName(asset.name)) {
            const baseName = stripChecksumSuffix(asset.name);
            const list = checksumMap.get(baseName) || [];
            list.push(asset);
            checksumMap.set(baseName, list);
            continue;
          }
          primaryAssets.push(asset);
        }

        const entries = primaryAssets.map((asset) => {
          const view = classifyAsset(asset);
          return {
            ...view,
            rawName: asset.name,
            href: asset.browser_download_url,
            size: formatBytes(asset.size),
            checksums: (checksumMap.get(asset.name) || []).sort((left, right) => left.name.localeCompare(right.name))
          };
        });

        for (const asset of release.assets || []) {
          if (!asset || typeof asset.name !== "string" || !isChecksumAssetName(asset.name)) {
            continue;
          }
          const baseName = stripChecksumSuffix(asset.name);
          const baseView = classifyAsset({ name: baseName });
          const checksumTargetTitle =
            baseView && baseView.platform
              ? baseView.title + " checksum"
              : baseName + " checksum";
          entries.push({
            platform: null,
            section: "advanced",
            order: 1000,
            tag: "Verification",
            title: checksumTargetTitle,
            description: checksumSuffix(asset.name) + " verification file",
            action: "Download " + checksumSuffix(asset.name),
            rawName: asset.name,
            href: asset.browser_download_url,
            size: formatBytes(asset.size),
            checksums: []
          });
        }

        entries.push(
          {
            platform: null,
            section: "developer",
            order: 10,
            tag: "Developers",
            title: "Source code (.zip)",
            description: "Source archive",
            action: "Download source ZIP",
            rawName: "Source code (zip)",
            href: release.zipball_url,
            size: "",
            checksums: []
          },
          {
            platform: null,
            section: "developer",
            order: 20,
            tag: "Developers",
            title: "Source code (.tar.gz)",
            description: "Source tarball",
            action: "Download source tarball",
            rawName: "Source code (tar.gz)",
            href: release.tarball_url,
            size: "",
            checksums: []
          }
        );

        return entries.sort((left, right) => left.order - right.order || left.title.localeCompare(right.title));
      }

      function platformDetails(platform, primaryEntry) {
        if (platform === "android") {
          return {
            title: "Android",
            subtitle: "Phones and tablets"
          };
        }
        if (platform === "windows") {
          return {
            title: "Windows",
            subtitle: "PC"
          };
        }
        if (platform === "linux") {
          return {
            title: "Linux",
            subtitle: "Desktop"
          };
        }
        if (primaryEntry && primaryEntry.rawName && /\.(dmg|pkg)$/i.test(primaryEntry.rawName)) {
          return {
            title: "macOS",
            subtitle: "Mac desktop"
          };
        }
        return {
          title: "iPhone & Mac",
          subtitle: "Apple devices"
        };
      }

      function platformIconSrc(platform) {
        if (platform === "android") {
          return "../images/platforms/android.svg";
        }
        if (platform === "windows") {
          return "../images/platforms/windows.svg";
        }
        if (platform === "linux") {
          return "../images/platforms/linux.svg";
        }
        return "../images/platforms/apple.svg";
      }

      function optionIconSrc(entry) {
        if (entry.platform === "linux" && entry.title === ".deb package") {
          return "../images/platforms/debian.svg";
        }
        if (entry.platform) {
          return platformIconSrc(entry.platform);
        }
        return "";
      }

      function renderPlatformOption(entry) {
        const iconSrc = optionIconSrc(entry);
        return (
          '<a class="platform-option" href="' + escapeHtml(entry.href) + '" target="_blank" rel="noreferrer">' +
            (iconSrc ? '<img class="platform-option-icon" src="' + escapeHtml(iconSrc) + '" alt="" loading="lazy" />' : "") +
            '<div class="platform-option-copy">' +
              "<span>" + escapeHtml(entry.title) + "</span>" +
              "<strong>" + escapeHtml(entry.description) + "</strong>" +
            "</div>" +
          "</a>"
        );
      }

      function renderPlatformCard(platform, primaryEntry, secondaryEntries) {
        const details = platformDetails(platform, primaryEntry);
        const cardClass = primaryEntry ? "platform-card" : "platform-card disabled";
        const meta = primaryEntry
          ? [primaryEntry.title, primaryEntry.size].filter(Boolean).join(" • ")
          : "";
        const action = primaryEntry
          ? '<a class="button" href="' + escapeHtml(primaryEntry.href) + '" target="_blank" rel="noreferrer">' + escapeHtml(primaryEntry.action) + "</a>"
          : '<span class="button is-disabled">Coming soon</span>';

        return (
          '<article class="' + cardClass + '">' +
            '<div class="platform-figure"><img src="' + escapeHtml(platformIconSrc(platform)) + '" alt="" loading="lazy" /></div>' +
            '<div class="platform-copy">' +
              "<h3>" + escapeHtml(details.title) + "</h3>" +
              "<p>" + escapeHtml(details.subtitle) + "</p>" +
            "</div>" +
            '<div class="platform-meta">' + escapeHtml(meta) + "</div>" +
            action +
            (secondaryEntries.length ? '<div class="platform-options">' + secondaryEntries.map(renderPlatformOption).join("") + "</div>" : "") +
          "</article>"
        );
      }

      function renderPlatformSection(entries) {
        const platformOrder = ["android", "windows", "linux", "apple"];
        const platformEntries = new Map();

        for (const entry of entries) {
          if (!entry.platform || entry.section === "advanced" || entry.section === "developer") {
            continue;
          }
          const list = platformEntries.get(entry.platform) || [];
          list.push(entry);
          platformEntries.set(entry.platform, list);
        }

        return (
          '<section class="section-block">' +
            '<div class="section-heading">' +
              "<h2>More downloads</h2>" +
              "<p>Extra packages, direct APKs, checksums, and source archives from the latest release.</p>" +
            "</div>" +
            '<div class="platform-grid">' +
              platformOrder
                .map((platform) => {
                  const entriesForPlatform = platformEntries.get(platform) || [];
                  const primaryEntry = entriesForPlatform.find((entry) => entry.section === "recommended") || entriesForPlatform[0] || null;
                  const secondaryEntries = entriesForPlatform.filter((entry) => entry !== primaryEntry);
                  return renderPlatformCard(platform, primaryEntry, secondaryEntries);
                })
                .join("") +
            "</div>" +
          "</section>"
        );
      }

      function renderSimpleRow(entry) {
        const meta = [entry.description, entry.size].filter(Boolean).join(" • ");
        return (
          '<div class="simple-row">' +
            '<div class="simple-copy">' +
              "<strong>" + escapeHtml(entry.title) + "</strong>" +
              (meta ? "<span>" + escapeHtml(meta) + "</span>" : "") +
            "</div>" +
            '<a class="button secondary" href="' + escapeHtml(entry.href) + '" target="_blank" rel="noreferrer">' + escapeHtml(entry.action) + "</a>" +
          "</div>"
        );
      }

      function renderSimpleSection(title, description, entries) {
        if (!entries.length) {
          return "";
        }
        return (
          '<section class="section-block">' +
            '<div class="section-heading">' +
              "<h2>" + escapeHtml(title) + "</h2>" +
              (description ? "<p>" + escapeHtml(description) + "</p>" : "") +
            "</div>" +
            '<div class="simple-list">' + entries.map(renderSimpleRow).join("") + "</div>" +
          "</section>"
        );
      }

      function renderRelease(release) {
        const entries = buildReleaseEntries(release);
        const remainingEntries = entries.filter((entry) => entry.section === "advanced" || entry.section === "developer");

        releaseMeta.innerHTML =
          "<strong>" + escapeHtml(release.tag_name || release.name || "Latest release") + "</strong>" +
          (release.published_at ? "<span>Published " + escapeHtml(formatDate(release.published_at)) + "</span>" : "") +
          '<a href="' + escapeHtml(release.html_url || RELEASES_PAGE_URL) + '" target="_blank" rel="noreferrer">View release page</a>';

        downloadsRoot.innerHTML =
          renderPlatformSection(entries) +
          renderSimpleSection(
            "Other files",
            "Checksums and source files.",
            remainingEntries
          );
      }

      function renderFailure(message) {
        releaseMeta.innerHTML =
          "<strong>Latest release lookup unavailable</strong>" +
          '<a href="' + RELEASES_PAGE_URL + '" target="_blank" rel="noreferrer">Open GitHub Releases</a>';

        downloadsRoot.innerHTML =
          '<div class="status-card">' +
            "<p>" + escapeHtml(message) + "</p>" +
            '<div class="button-row" style="margin-top: 1rem;">' +
              '<a class="button" href="' + RELEASES_PAGE_URL + '" target="_blank" rel="noreferrer">Open GitHub Releases</a>' +
            "</div>" +
          "</div>";
      }

      async function fetchLatestRelease() {
        const response = await fetch(RELEASE_API_URL, {
          headers: {
            Accept: "application/vnd.github+json"
          }
        });
        if (!response.ok) {
          throw new Error("release_lookup_" + response.status);
        }
        return response.json();
      }

      async function loadRelease() {
        const cached = readCache();
        if (cached && cached.release) {
          renderRelease(cached.release);
          if (isFresh(cached)) {
            return;
          }
        }

        try {
          const release = await fetchLatestRelease();
          writeCache({
            fetchedAt: Date.now(),
            release: release
          });
          renderRelease(release);
        } catch (error) {
          if (cached && cached.release) {
            renderRelease(cached.release);
            return;
          }
          const message = error && typeof error.message === "string"
            ? "Could not load the latest release automatically (" + error.message + ")."
            : "Could not load the latest release automatically.";
          renderFailure(message);
        }
      }

      void loadRelease();
    </script>
  </body>
</html>
