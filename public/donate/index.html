<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Axichat</title>
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" data-theme-color="light" />
    <meta name="theme-color" content="#090909" media="(prefers-color-scheme: dark)" data-theme-color="dark" />
    <link rel="stylesheet" href="../components.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff;
        color: #111;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      main {
        box-sizing: border-box;
        width: min(100%, 44rem);
        padding: 0 2rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: 0.01em;
      }
      p {
        margin: 0 0 2rem;
        color: rgba(17, 17, 17, 0.8);
        font-size: 1rem;
        line-height: 1.5;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 0.75rem;
      }
      .kofi-link {
        display: inline-block;
        transition: filter 0.2s ease;
      }
      .kofi-link:hover {
        filter: brightness(0.95);
      }
      .home-link {
        display: inline-block;
        margin-top: 1.5rem;
        color: rgba(17, 17, 17, 0.8);
        text-decoration: none;
        border-bottom: 1px solid rgba(17, 17, 17, 0.35);
      }
      .home-link:hover {
        color: #111;
        border-bottom-color: rgba(17, 17, 17, 0.65);
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
      }
      :root[data-theme="dark"] body {
        background: #09090b;
        color: #f7f7f8;
      }
      :root[data-theme="dark"] p,
      :root[data-theme="dark"] .home-link {
        color: rgba(247, 247, 248, 0.82);
      }
      :root[data-theme="dark"] .home-link {
        border-bottom-color: rgba(247, 247, 248, 0.42);
      }
      :root[data-theme="dark"] .home-link:hover {
        color: #ffffff;
        border-bottom-color: rgba(247, 247, 248, 0.8);
      }
      :root[data-theme="dark"] .actions a:hover img {
        filter: brightness(1.1);
      }
    </style>
    <link rel="stylesheet" href="../dark.css" media="(prefers-color-scheme: dark)" data-dark-styles />
    <script src="../theme.js"></script>
  </head>
  <body class="donate-page">
    <button type="button" class="theme-toggle theme-toggle--floating" data-theme-toggle role="switch" aria-checked="false" aria-label="Dark mode" hidden>
      <span class="theme-toggle__thumb" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" class="theme-toggle__icon theme-toggle__sun">
          <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="1.8" />
          <path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5.3 5.3l1.4 1.4M17.3 17.3l1.4 1.4M18.7 5.3l-1.4 1.4M6.7 17.3l-1.4 1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        <svg viewBox="0 0 24 24" fill="none" class="theme-toggle__icon theme-toggle__moon">
          <path d="M20 15.2A8.5 8.5 0 0 1 8.8 4a8.5 8.5 0 1 0 11.2 11.2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
        </svg>
      </span>
    </button>
    <main>
      <h1>I'm glad you like Axichat!</h1>
      <p>Your support helps me maintain the app and servers. No pressure... even if you don't donate I'll probably maintain it anyway.</p>
      <div class="actions">
        <a href="https://www.buymeacoffee.com/axichat" target="_blank" rel="noreferrer">
          <img
            src="https://img.buymeacoffee.com/button-api/?text=Buy%20me%20a%20coffee&amp;emoji=&amp;slug=axichat&amp;button_colour=FFDD00&amp;font_colour=000000&amp;font_family=Cookie&amp;outline_colour=000000&amp;coffee_colour=ffffff"
            alt="Buy me a coffee"
            height="48"
            style="border: 0; height: 48px;"
          />
        </a>
        <a class="kofi-link" href="https://ko-fi.com/S6S01VF1Z1" target="_blank" rel="noreferrer">
          <img
            src="https://storage.ko-fi.com/cdn/kofi6.png?v=6"
            alt="Buy Me a Coffee at ko-fi.com"
            height="48"
            style="border: 0; height: 48px;"
            border="0"
          />
        </a>
      </div>
      <div>
        <a class="home-link" href="../">Back to main site</a>
      </div>
    </main>
  </body>
</html>
