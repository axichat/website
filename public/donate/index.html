<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Axichat</title>
    <meta name="description" content="Support Axichat development and service maintenance." />
    <link rel="canonical" href="https://axi.chat/donate/" />
    <meta property="og:title" content="Support Axichat" />
    <meta property="og:description" content="Support Axichat development and service maintenance." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://axi.chat/donate/" />
    <meta property="og:image" content="https://axi.chat/images/brand/axichat_banner.png" />
    <meta property="og:image:alt" content="Axichat banner" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Support Axichat" />
    <meta name="twitter:description" content="Support Axichat development and service maintenance." />
    <meta name="twitter:image" content="https://axi.chat/images/brand/axichat_banner.png" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" data-theme-color="light" />
    <meta name="theme-color" content="#090909" media="(prefers-color-scheme: dark)" data-theme-color="dark" />
    <link rel="stylesheet" href="../components.css?v=2" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff;
        color: #111;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      main {
        box-sizing: border-box;
        width: min(100%, 44rem);
        padding: 0 2rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: 0.01em;
      }
      p {
        margin: 0 0 2rem;
        color: rgba(17, 17, 17, 0.8);
        font-size: 1rem;
        line-height: 1.5;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 0.75rem;
      }
      .kofi-link {
        display: inline-block;
        transition: filter 0.2s ease;
      }
      .kofi-link:hover {
        filter: brightness(0.95);
      }
      .home-link {
        display: inline-block;
        margin-top: 1.5rem;
        color: rgba(17, 17, 17, 0.8);
        text-decoration: none;
        border-bottom: 1px solid rgba(17, 17, 17, 0.35);
      }
      .home-link:hover {
        color: #111;
        border-bottom-color: rgba(17, 17, 17, 0.65);
      }
    </style>
    <link rel="stylesheet" href="../dark.css?v=2" media="(prefers-color-scheme: dark)" data-dark-styles />
    <script src="../theme.js?v=2"></script>
  </head>
  <body class="donate-page">
    <main>
      <h1>We're glad you like Axichat!</h1>
      <p>Your support helps us maintain the service. If nobody donates, we'll try to maintain it anyway.</p>
      <div class="actions">
        <a href="https://www.buymeacoffee.com/axichat" target="_blank" rel="noreferrer">
          <img
            src="https://img.buymeacoffee.com/button-api/?text=Buy%20me%20a%20coffee&amp;emoji=&amp;slug=axichat&amp;button_colour=FFDD00&amp;font_colour=000000&amp;font_family=Cookie&amp;outline_colour=000000&amp;coffee_colour=ffffff"
            alt="Buy me a coffee"
            height="48"
            style="border: 0; height: 48px;"
          />
        </a>
        <a class="kofi-link" href="https://ko-fi.com/S6S01VF1Z1" target="_blank" rel="noreferrer">
          <img
            src="https://storage.ko-fi.com/cdn/kofi6.png?v=6"
            alt="Buy Me a Coffee at ko-fi.com"
            height="48"
            style="border: 0; height: 48px;"
            border="0"
          />
        </a>
      </div>
      <div>
        <a class="home-link" href="../">Back to main site</a>
      </div>
    </main>
  </body>
</html>
