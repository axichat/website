<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axichat Privacy Policy</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        background: #ffffff;
        color: #111111;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(96vw, 72rem);
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
      }
      p {
        max-width: 52rem;
        font-size: 1rem;
        line-height: 1.65;
        color: rgba(17, 17, 17, 0.78);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.875rem;
        margin: 1.5rem 0 2rem;
      }
      .button,
      .link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.85rem;
        padding: 0.8rem 1.1rem;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
      }
      .button {
        border: 1px solid #111111;
        background: #111111;
        color: #ffffff;
      }
      .link {
        border: 1px solid rgba(17, 17, 17, 0.14);
        background: #ffffff;
        color: #111111;
      }
      .viewer {
        overflow: hidden;
        border: 1px solid rgba(17, 17, 17, 0.1);
        border-radius: 1.5rem;
        background: rgba(17, 17, 17, 0.03);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
      }
      object {
        display: block;
        width: 100%;
        height: min(78vh, 64rem);
        border: 0;
        background: #ffffff;
      }
      .fallback {
        padding: 1.25rem;
      }
      .fallback a {
        color: #111111;
      }
      @media (max-width: 640px) {
        main {
          padding-top: 1.5rem;
        }
        object {
          height: 70vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Axichat Privacy Policy</h1>
      <p>
        This page provides a web version of the Axichat privacy policy. The full policy is embedded below, and you can
        also open the original PDF directly if you prefer.
      </p>
      <div class="actions">
        <a class="button" href="../axichat_privacy.pdf">Open PDF</a>
        <a class="link" href="../">Back to main site</a>
      </div>
      <div class="viewer">
        <object data="../axichat_privacy.pdf" type="application/pdf" aria-label="Axichat privacy policy PDF">
          <div class="fallback">
            <p>
              Your browser could not display the embedded PDF. You can open the privacy policy directly
              <a href="../axichat_privacy.pdf">here</a>.
            </p>
          </div>
        </object>
      </div>
    </main>
  </body>
</html>
